[build]
  command = "yarn build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production.environment]
  NODE_VERSION = "22"
[build]
  command = "npm run build"
  # Netlify's Next.js plugin will handle the correct publish/output

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production.environment]
  # ensure Next uses the correct image optimization and other features
  NEXT_RUNTIME = "node"
